{% extends "base.html" %}
{% block content %}

<section class="card page-card">
  <div class="page-head">
    <div>
      <div class="page-title">What is your age?</div>
      <div class="page-sub">This helps EduBear pick the best learning content for you.</div>
    </div>
  </div>

  <form method="post" action="{{ url_for('ask_age_post') }}">
    <div class="field">
      <label class="label">Age</label>
      <input class="input" name="age" type="number" min="3" max="120" placeholder="e.g. 8" required autofocus>
    </div>

    <div style="height:14px;"></div>
    <button class="btn primary big block" type="submit">CONTINUE</button>
  </form>
</section>

{% endblock %}
