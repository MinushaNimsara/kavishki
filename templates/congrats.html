{% extends "base.html" %}
{% block content %}

<div class="card congrats-card" style="text-align:center; padding:40px 24px;">
  <div class="h1" style="font-size:2rem;">Congratulations! 🎉</div>
  <div class="p" style="font-size:1.2rem;">You completed all stages, {{ user.nickname }}!</div>
  <div class="p">You are a superstar learner! 🌟</div>

  <div style="height:24px;"></div>

  <div class="bear big" style="font-size:80px;">🐻🌸</div>

  <div style="height:24px;"></div>

  <a class="btn primary" href="{{ url_for('stages') }}">Back to stages</a>
</div>

<!-- Flower petals falling animation -->
<div id="petals-container" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden;"></div>

<style>
  .petal {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50% 0 50% 50%;
    transform: rotate(0deg);
    animation: fall linear forwards;
  }
  @keyframes fall {
    0% {
      transform: translateY(-10px) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(720deg);
      opacity: 0.3;
    }
  }
</style>

<script>
(function() {
  const colors = ["#f472b6", "#fb7185", "#fda4af", "#fbcfe8", "#f9a8d4", "#ec4899", "#f43f5e"];
  const petalCount = 50;
  const container = document.getElementById("petals-container");

  for (let i = 0; i < petalCount; i++) {
    setTimeout(function() {
      const p = document.createElement("div");
      p.className = "petal";
      p.style.left = Math.random() * 100 + "vw";
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (4 + Math.random() * 6) + "s";
      p.style.animationDelay = (Math.random() * 2) + "s";
      container.appendChild(p);
      setTimeout(function() {
        p.remove();
      }, 12000);
    }, i * 80);
  }
})();
</script>

{% endblock %}
