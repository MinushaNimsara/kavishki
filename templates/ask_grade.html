{% extends "base.html" %}
{% block content %}

<section class="card page-card">
  <div class="page-head">
    <div>
      <div class="page-title">Choose your grade</div>
      <div class="page-sub">EduBear will pick questions that match your grade.</div>
    </div>
  </div>

  <form method="post" action="{{ url_for('ask_grade_post') }}">
    <div class="grade-list">
      {% for g in [1,2,3,4,5] %}
      <label class="grade-item g{{ g }}">
        <input type="radio" name="grade" value="{{ g }}" {{ 'checked' if (current_grade|default(1)) == g else '' }} required>
        <div class="grade-text">Grade {{ g }}</div>
      </label>
      {% endfor %}
    </div>

    <div style="height:14px;"></div>
    <button class="btn primary big block" type="submit">CONTINUE</button>
  </form>
</section>

{% endblock %}
