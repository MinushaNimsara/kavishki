{% extends "base.html" %}
{% block content %}

<section class="card page-card">
  <div class="page-head">
    <div>
      <div class="page-title">Choose your subject</div>
      <div class="page-sub">Pick what you'd like to learn today.</div>
    </div>
  </div>

  <form method="post" action="{{ url_for('choose_subject_post') }}">
    <div class="grade-list">
      {% for s in subjects %}
      <label class="grade-item">
        <input type="radio" name="subject" value="{{ s }}" required>
        <div class="grade-text">{{ s }}</div>
      </label>
      {% endfor %}
    </div>

    <div style="height:14px;"></div>
    <button class="btn primary big block" type="submit">CONTINUE</button>
  </form>
</section>

{% endblock %}
